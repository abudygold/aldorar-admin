<lib-table
	[config]="tableModel"
	(sortChange)="sortChange($event)"
	(pageChange)="pageChange($event)">
	<ng-template #customTemplate let-data="data" let-key="key">
		@if (key === 'documents') {
			<div class="tw:grid tw:gap-2 tw:m-2">
				<app-status-badge
					label="KK"
					[status]="getDocumentStatus(data.documents, 'family_card')" />
				<app-status-badge label="KTP" [status]="getDocumentStatus(data.documents, 'ktp')" />
				<app-status-badge
					label="Passport"
					[status]="getDocumentStatus(data.documents, 'passport')" />
				<app-status-badge
					label="Vaccine Certificate"
					[status]="getDocumentStatus(data.documents, 'vaccine_certificate')" />
				<app-status-badge
					label="Photo"
					[status]="getDocumentStatus(data.documents, 'photo')" />
			</div>
		} @else if (key === 'completion') {
			{{ data.completion }}%
		} @else if (key === 'actions') {
			<div class="tw:flex tw:gap-3">
				<fa-icon
					[icon]="faIcon.faEdit"
					size="lg"
					class="tw:text-blue-400"
					(click)="onAction('edit', data?.id)" />
				<fa-icon
					[icon]="faIcon.faTrash"
					size="lg"
					class="tw:text-red-400"
					(click)="onAction('delete', data?.id)" />
			</div>
		}
	</ng-template>
</lib-table>
