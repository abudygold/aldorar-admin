<div class="tw:grid">
	<div class="tw:mb-3">
		<lib-textbox
			class="no-hint"
			[field]="{
				key: 'title',
				type: 'textbox',
				control: $any(formData.title),
				config: {
					label: 'Judul',
				},
			}" />

		<app-message-validation [fieldState]="formData.title()" />
	</div>

	<div class="tw:mb-3">
		<lib-dropdown
			class="no-hint"
			[field]="{
				key: 'categoryId',
				type: 'dropdown',
				control: $any(formData.categoryId),
				config: {
					label: 'Kategori',
					options: {
						data: opt.category() || [],
						labelKey: 'label',
						valueKey: 'id',
					},
				},
			}" />

		<app-message-validation [fieldState]="formData.categoryId()" />
	</div>

	<div class="tw:flex tw:gap-4 tw:mb-3">
		<mat-form-field appearance="outline" class="tw:w-full no-hint">
			<mat-label>Thumbnail</mat-label>

			<input
				matInput
				[value]="formModel().thumbnailUrl || selectedFile()?.name || ''"
				disabled />
			<button
				mat-icon-button
				matSuffix
				class="tw:mr-4 tw:cursor-pointer"
				(click)="fileInput.click()">
				<fa-icon [icon]="faIcon.faPaperclip" />
			</button>

			<input hidden (change)="onFileSelected($event)" #fileInput type="file" id="file" />
		</mat-form-field>

		@if (formModel().thumbnailUrl) {
			<img [src]="formModel().thumbnailUrl" class="tw:max-h-14" alt="Cover Image" />
		}
	</div>

	<div class="tw:mb-3">
		<lib-textarea
			class="no-hint"
			[field]="{
				key: 'shortContent',
				type: 'textarea',
				control: $any(formData.shortContent),
				config: {
					label: 'Konten Singkat',
				},
			}" />

		<app-message-validation [fieldState]="formData.shortContent()" />
	</div>

	<div class="tw:mb-3">
		<textarea id="editor"></textarea>

		<app-message-validation [fieldState]="formData.content()" />
	</div>

	<lib-slide-toggle
		[field]="{
			key: 'isPublish',
			type: 'slide-toggle',
			control: $any(formData.isPublish),
			config: {
				label: 'Publish',
			},
		}" />

	<hr class="tw:text-gray-300 tw:my-3 tw:shadow" />

	<div class="tw:flex tw:justify-between tw:gap-6 tw:my-4">
		<lib-button [config]="btn.cancel()" />
		<lib-button [config]="btn.save()" />
	</div>
</div>
