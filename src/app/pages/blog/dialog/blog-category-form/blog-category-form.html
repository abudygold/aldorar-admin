<lib-dialog [title]="data ? 'Edit Category' : 'Add Category'">
	<ng-container content>
		<div class="tw:pt-5">
			<lib-formly [formConfig]="formConfig()" />
		</div>
	</ng-container>
	<ng-container actions>
		<div class="tw-flex tw-justify-between tw-gap-3">
			<button matButton (click)="dialogRef.close()">Close</button>
			<button matButton="filled" (click)="onSubmit()">Submit</button>
		</div>
	</ng-container>
</lib-dialog>
