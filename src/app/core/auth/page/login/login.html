<section class="tw:flex tw:justify-center tw:min-h-full auth-layout">
	<div class="tw:grid tw:py-8 tw:px-4 tw:md:lg:px-4 tw:md:lg:py-16 tw:gap-6 tw:place-self-center">
		<div class="tw:place-self-center">
			<img
				src="./logo/adam-tour-white.svg"
				alt="Adam Tour Logo"
				class="tw:h-24 tw:w-72 tw:object-cover tw:cursor-pointer" />
		</div>
		<div class="tw:place-self-center tw:min-w-full">
			<div
				class="tw:bg-white tw:p-6 tw:rounded-lg tw:shadow tw:mx-auto md:lg:tw:p-8 tw:md:lg:min-w-md tw:max-w-xl">
				<h1
					class="tw:font-bold tw:text-2xl tw:text-gray-900 tw:leading-5 tw:tracking-tight tw:text-center tw:mb-5">
					Login
				</h1>

				<lib-formly [formConfig]="formConfig" />

				<div class="tw:my-4">
					<button matButton="filled" class="tw:w-full" (click)="doLogin()">Login</button>
				</div>
			</div>
		</div>
	</div>
</section>
